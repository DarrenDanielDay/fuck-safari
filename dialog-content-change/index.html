<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dialog Content Change</title>
  </head>
  <body>
    <div>
      <div>
        <button onclick="dialog.showModal()">open dialog</button>
      </div>
      <div id="host"></div>
    </div>
    <script>
      var host = document.getElementById("host");
      var shadow = host.attachShadow({ mode: "open" });
      shadow.innerHTML =
        '\
      <dialog>\
        <div class="header">Header</div>\
        <select>\
          <option>select widget</option>\
        </select>\
        <div id="content">\
            <slot name="s"></slot>\
        </div>\
        <div class="footer">\
          <button type="button" id="update">update</button>\
        </div>\
      </dialog>\
      ';
      var dialog = shadow.querySelector("dialog");
      var updateBtn = shadow.getElementById("update");
      function update() {
        setTimeout(function () {
          host.innerHTML =
            '<span slot="s">Updated at ' +
            new Date().toLocaleString() +
            "</span>";
        }, 300);
      }
      updateBtn.onclick = update;
      update();
    </script>
  </body>
</html>
